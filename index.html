<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bucks2Bar</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #f8f9fa; }
        .tab-content { background: #fff; border: 1px solid #dee2e6; border-top: none; border-radius: 0 0 0.375rem 0.375rem; padding: 1.5rem; }
        #budgetChart { max-height: 450px; }
        .input-month { width: 130px; }
    </style>
</head>
<body>
    <div class="container py-4">
        <h1 class="mb-4 fw-bold text-success">Bucks2Bar</h1>

        <ul class="nav nav-tabs" id="mainTabs" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" id="data-tab" data-bs-toggle="tab" data-bs-target="#data-pane"
                    type="button" role="tab" aria-controls="data-pane" aria-selected="true">
                    Data
                </button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="chart-tab" data-bs-toggle="tab" data-bs-target="#chart-pane"
                    type="button" role="tab" aria-controls="chart-pane" aria-selected="false">
                    Chart
                </button>
            </li>
        </ul>

        <div class="tab-content" id="mainTabContent">

            <!-- DATA TAB -->
            <div class="tab-pane fade show active" id="data-pane" role="tabpanel" aria-labelledby="data-tab">
                <h5 class="mb-3 text-secondary">Monthly Income &amp; Expenses</h5>
                <div class="table-responsive">
                    <table class="table table-striped table-bordered align-middle">
                        <thead class="table-dark">
                            <tr>
                                <th>Month</th>
                                <th>Income (£)</th>
                                <th>Expenses (£)</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr><td>January</td>   <td><input class="form-control input-month" type="number" id="income-jan"  min="0" step="0.01" value="850"></td><td><input class="form-control input-month" type="number" id="expense-jan"  min="0" step="0.01" value="620"></td></tr>
                            <tr><td>February</td>  <td><input class="form-control input-month" type="number" id="income-feb"  min="0" step="0.01" value="920"></td><td><input class="form-control input-month" type="number" id="expense-feb"  min="0" step="0.01" value="540"></td></tr>
                            <tr><td>March</td>     <td><input class="form-control input-month" type="number" id="income-mar"  min="0" step="0.01" value="760"></td><td><input class="form-control input-month" type="number" id="expense-mar"  min="0" step="0.01" value="480"></td></tr>
                            <tr><td>April</td>     <td><input class="form-control input-month" type="number" id="income-apr"  min="0" step="0.01" value="880"></td><td><input class="form-control input-month" type="number" id="expense-apr"  min="0" step="0.01" value="710"></td></tr>
                            <tr><td>May</td>       <td><input class="form-control input-month" type="number" id="income-may"  min="0" step="0.01" value="650"></td><td><input class="form-control input-month" type="number" id="expense-may"  min="0" step="0.01" value="390"></td></tr>
                            <tr><td>June</td>      <td><input class="form-control input-month" type="number" id="income-jun"  min="0" step="0.01" value="970"></td><td><input class="form-control input-month" type="number" id="expense-jun"  min="0" step="0.01" value="830"></td></tr>
                            <tr><td>July</td>      <td><input class="form-control input-month" type="number" id="income-jul"  min="0" step="0.01" value="540"></td><td><input class="form-control input-month" type="number" id="expense-jul"  min="0" step="0.01" value="290"></td></tr>
                            <tr><td>August</td>    <td><input class="form-control input-month" type="number" id="income-aug"  min="0" step="0.01" value="810"></td><td><input class="form-control input-month" type="number" id="expense-aug"  min="0" step="0.01" value="650"></td></tr>
                            <tr><td>September</td> <td><input class="form-control input-month" type="number" id="income-sep"  min="0" step="0.01" value="730"></td><td><input class="form-control input-month" type="number" id="expense-sep"  min="0" step="0.01" value="570"></td></tr>
                            <tr><td>October</td>   <td><input class="form-control input-month" type="number" id="income-oct"  min="0" step="0.01" value="990"></td><td><input class="form-control input-month" type="number" id="expense-oct"  min="0" step="0.01" value="780"></td></tr>
                            <tr><td>November</td>  <td><input class="form-control input-month" type="number" id="income-nov"  min="0" step="0.01" value="620"></td><td><input class="form-control input-month" type="number" id="expense-nov"  min="0" step="0.01" value="430"></td></tr>
                            <tr><td>December</td>  <td><input class="form-control input-month" type="number" id="income-dec"  min="0" step="0.01" value="450"></td><td><input class="form-control input-month" type="number" id="expense-dec"  min="0" step="0.01" value="920"></td></tr>
                        </tbody>
                    </table>
                </div>
                <button id="updateChartBtn" class="btn btn-success mt-2">Update Chart</button>
            </div>

            <!-- CHART TAB -->
            <div class="tab-pane fade" id="chart-pane" role="tabpanel" aria-labelledby="chart-tab">
                <h5 class="mb-3 text-secondary">Income vs Expenses</h5>
                <canvas id="budgetChart"></canvas>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
